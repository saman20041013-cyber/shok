
<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandoob Tracker System</title>

<style>
:root {
--primary:#2563eb;
--danger:#dc2626;
--success:#16a34a;
--bg:#f8fafc;
}

body{
font-family:Segoe UI,sans-serif;
background:var(--bg);
display:flex;
justify-content:center;
padding:20px;
}

.container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,.1);
width:100%;
max-width:450px;
direction:rtl;
}

h2,h3{
text-align:center;
color:#1e293b;
}

.status-box{
padding:10px;
border-radius:6px;
margin-bottom:20px;
text-align:center;
background:#fef2f2;
color:var(--danger);
}

.status-box.active{
background:#f0fdf4;
color:var(--success);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #cbd5e1;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:0;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.btn-location{
background:#64748b;
color:white;
}

.btn-login{
background:var(--primary);
color:white;
}

button:disabled{
background:#cbd5e1;
}

#adminPanel{
display:none;
margin-top:30px;
border-top:2px solid #ddd;
padding-top:20px;
}

.history-item{
background:#f1f5f9;
padding:12px;
margin-bottom:10px;
border-radius:6px;
font-size:13px;
}

.map-link{
display:inline-block;
background:#dc2626;
color:white;
padding:5px 10px;
margin-top:8px;
text-decoration:none;
border-radius:5px;
}
</style>

</head>

<body>

<div class="container">

<h2>Secure Portal</h2>

<div id="status" class="status-box">
📍 تکایە سەرەتا لۆکەیشن چالاک بکە
</div>


<button class="btn-location" onclick="enableLocation()">
📍 چالاککردنی لۆکەیشن
</button>


<input id="user" type="text" placeholder="ناوی بەکارهێنەر" disabled>

<input id="pass" type="password" placeholder="پاسۆرد" disabled>


<button id="loginBtn" class="btn-login" onclick="login()" disabled>
چوونەژوورەوە
</button>



<div id="adminPanel">

<h3>📊 چاودێری مەندوب</h3>

<div id="historyList"></div>

<button onclick="clearHistory()">
سڕینەوەی داتا
</button>

</div>


</div>



<script>

let currentLocation=null;


const users={
"safaa":"123",
"ahmed":"123"
};



function enableLocation(){

if(!navigator.geolocation){

alert("براوزەرەکەت پشتگیری لۆکەیشن ناکات");
return;

}


navigator.geolocation.getCurrentPosition(

function(position){


currentLocation={

lat:position.coords.latitude,

lng:position.coords.longitude,

time:new Date().toLocaleString()

};



document.getElementById("status").innerHTML=
"✅ لۆکەیشن چالاکە";


document.getElementById("status")
.classList.add("active");


document.getElementById("user").disabled=false;

document.getElementById("pass").disabled=false;

document.getElementById("loginBtn").disabled=false;



alert("📍 لۆکەیشن وەرگیرا");


},


function(error){


if(error.code==1){

alert("مۆڵەتی لۆکەیشن ڕەتکراوەتەوە");

}

else if(error.code==2){

alert("GPS نادیارە");

}

else{

alert("کێشە لە لۆکەیشن");

}


},


{

enableHighAccuracy:true,

timeout:15000,

maximumAge:0

}



);


}





function login(){


let u=document.getElementById("user").value.toLowerCase();

let p=document.getElementById("pass").value;



if(users[u] && users[u]==p){


saveData(u);



if(u=="safaa"){

document.getElementById("adminPanel").style.display="block";

showData();

}



alert("لۆگین سەرکەوتوو بوو");


}

else{


alert("یوزەر یان پاسۆرد هەڵەیە");

}



}




function saveData(user){


let data=
JSON.parse(localStorage.getItem("mandoob")) || [];


data.push({

user:user,

lat:currentLocation.lat,

lng:currentLocation.lng,

time:currentLocation.time


});


localStorage.setItem(
"mandoob",
JSON.stringify(data)

);


}




function showData(){


let box=document.getElementById("historyList");


let data=
JSON.parse(localStorage.getItem("mandoob")) || [];



box.innerHTML="";


data.reverse().forEach(x=>{


box.innerHTML+=`

<div class="history-item">

👤 ${x.user}<br>

⏰ ${x.time}<br>

📍 ${x.lat}, ${x.lng}

<br>

<a class="map-link"
href="https://maps.google.com/?q=${x.lat},${x.lng}"
target="_blank">

    نیشاندانی شوێن

</a>

</div>

`;


});


}




function clearHistory(){

localStorage.removeItem("mandoob");

showData();

}


</script>


</body>
</html>
